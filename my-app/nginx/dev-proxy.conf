# Local reverse proxy: http://localhost:8088 → Next.js http://127.0.0.1:3000
# Intel Mac / non-Homebrew: change the `include` line to
#   /usr/local/etc/nginx/mime.types
#
# Start:  bash my-app/nginx/start.sh
# Stop:   bash my-app/nginx/stop.sh
# Test:   nginx -t -c /absolute/path/to/dev-proxy.conf

worker_processes  1;
error_log  /tmp/aiagent-nginx-error.log;
pid        /tmp/aiagent-nginx-dev.pid;

events {
    worker_connections  1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8088;
        server_name  localhost;
        client_max_body_size 20m;

        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout   3600s;
            proxy_send_timeout   3600s;
        }
    }
}
